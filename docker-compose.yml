version: '3.8'

services:
  petshop-sql:
    image: mysql:8.0
    container_name: petshop_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: petshop
      MYSQL_USER: user
      MYSQL_PASSWORD: 123456
    ports:
      - "3334:3306"
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: